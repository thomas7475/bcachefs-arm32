name: Build bcachefs armhf

on:
  push:
    tags:
      - 'v*'                # triggers automatically on git tag pushes
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag or version to build (e.g., v1.38.8 or master)'
        required: true
        type: string
        default: 'master'

# REQUIRED so the workflow is allowed to create GitHub Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # allow up to 2 hours for QEMU compilation

    # Create a dynamic environment variable that seamlessly handles either trigger
    env:
      TARGET_VERSION: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # needed to get all tags

      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run the build script
        run: |
          chmod +x build_bcachefs.sh
          # Pass the dynamic TARGET_VERSION to the shell script
          ./build_bcachefs.sh --engine docker "${TARGET_VERSION}"

      - name: Upload .deb artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: bcachefs-debs
          path: ./*.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TARGET_VERSION }}
          files: ./*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}